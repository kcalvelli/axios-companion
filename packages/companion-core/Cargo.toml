[package]
name = "companion-core"
version = "0.1.0"
edition = "2021"
description = "axios-companion daemon — persistent session manager and D-Bus control plane"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-journald = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rusqlite = { version = "0.35", features = ["bundled"] }
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zbus = { version = "5", default-features = false, features = ["tokio"] }
sd-notify = "0.4"
axum = "0.8"
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4"] }
teloxide = { version = "0.13", default-features = false, features = ["macros", "rustls"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tokio-xmpp = "5"
xmpp-parsers = "0.22"
# Direct deps so the xmpp channel can supply its own rustls ClientConfig.
# tokio-xmpp 5.0.0 hardcodes its TLS trust store inside
# `connect/tls_common.rs::establish_tls_connection` with no override hook,
# so we implement our own ServerConnector. See channels/xmpp/connector.rs.
tokio-rustls = { version = "0.26", default-features = false, features = ["aws_lc_rs", "logging", "tls12"] }
sasl = "0.5"
futures = "0.3"
log = "0.4"

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
